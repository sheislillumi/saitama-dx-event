<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>出展申込フォーム | 県内企業DX推進統合イベント</title>
  <link rel="stylesheet" href="../assets/css/style.css" />
</head>
<body>
  <header class="site-header">
    <a class="back-link" href="../index.html">← イベントHPに戻る</a>
  </header>

  <main class="page-container">
    <h1 class="page-title">出展申込フォーム</h1>
    <p class="page-lead">
      県内企業DX推進統合イベント(2027年1月20日・ソニックシティ)への出展をご希望の企業様は、
      以下のフォームよりお申し込みください。内容を確認のうえ、選定結果を担当者よりご連絡いたします。
    </p>

    <div id="formMessage" class="form-message" role="alert" hidden></div>

    <form id="exhibitorForm" class="form-card" novalidate>
      <div class="form-group">
        <label class="form-label" for="companyName">会社名<span class="required-badge">必須</span></label>
        <input type="text" id="companyName" name="companyName" autocomplete="organization" required />
        <p class="field-error" data-error-for="companyName">会社名を入力してください。</p>
      </div>

      <div class="form-group">
        <label class="form-label" for="contactName">担当者名<span class="required-badge">必須</span></label>
        <input type="text" id="contactName" name="contactName" autocomplete="name" required />
        <p class="field-error" data-error-for="contactName">担当者名を入力してください。</p>
      </div>

      <div class="form-group">
        <label class="form-label" for="email">メールアドレス<span class="required-badge">必須</span></label>
        <input type="email" id="email" name="email" autocomplete="email" required />
        <p class="field-error" data-error-for="email">メールアドレスを正しい形式で入力してください。</p>
        <p class="field-warning" id="emailTypoWarning" hidden></p>
      </div>

      <div class="form-group">
        <label class="form-label" for="emailConfirm">メールアドレス(確認用)<span class="required-badge">必須</span></label>
        <input type="email" id="emailConfirm" name="emailConfirm" autocomplete="email" required />
        <p class="field-error" data-error-for="emailConfirm">メールアドレスが一致しません。</p>
      </div>

      <div class="form-group">
        <label class="form-label" for="phone">電話番号<span class="required-badge">必須</span></label>
        <input type="tel" id="phone" name="phone" autocomplete="tel" placeholder="例: 048-000-0000" required />
        <p class="field-error" data-error-for="phone">電話番号を入力してください。</p>
      </div>

      <div class="form-group">
        <label class="form-label" for="category">希望カテゴリ<span class="required-badge">必須</span></label>
        <select id="category" name="category" required>
          <option value="">選択してください</option>
          <option value="汎用ツール">汎用ツール</option>
          <option value="業種共通ソリューション">業種共通ソリューション</option>
          <option value="業種特化ソリューション">業種特化ソリューション</option>
        </select>
        <p class="field-error" data-error-for="category">希望カテゴリを選択してください。</p>
      </div>

      <div class="form-group">
        <label class="form-label" for="description">展示内容概要<span class="optional-badge">任意</span></label>
        <textarea id="description" name="description" placeholder="出展予定の製品・サービス内容を簡単にご記入ください"></textarea>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label" for="powerNeeded">電源要否<span class="optional-badge">任意</span></label>
          <select id="powerNeeded" name="powerNeeded">
            <option value="">選択してください</option>
            <option value="要">要</option>
            <option value="不要">不要</option>
          </select>
        </div>

        <div class="form-group">
          <label class="form-label" for="loadingTime">搬入出希望時間<span class="optional-badge">任意</span></label>
          <input type="text" id="loadingTime" name="loadingTime" placeholder="例: 9:00〜9:30" />
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" for="notes">備考<span class="optional-badge">任意</span></label>
        <textarea id="notes" name="notes" placeholder="ご要望等があればご記入ください"></textarea>
      </div>

      <button type="submit" class="btn btn-block" id="submitBtn">申し込む</button>
    </form>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/mailcheck@1.1.2/src/mailcheck.min.js"></script>
  <script src="../assets/js/common.js"></script>
  <script src="../assets/js/api-client.js"></script>
  <script>
    (function () {
      const form = document.getElementById('exhibitorForm');
      const submitBtn = document.getElementById('submitBtn');
      const messageBox = document.getElementById('formMessage');

      const requiredFields = ['companyName', 'contactName', 'email', 'emailConfirm', 'phone', 'category'];

      function fieldGroup(name) {
        return form.elements[name].closest('.form-group');
      }

      function setFieldError(name, isError) {
        const group = fieldGroup(name);
        const errorEl = form.querySelector('[data-error-for="' + name + '"]');
        if (group) group.classList.toggle('has-error', isError);
        if (errorEl) errorEl.classList.toggle('is-visible', isError);
      }

      function checkEmailMatch() {
        const email = form.elements.email.value.trim();
        const emailConfirm = form.elements.emailConfirm.value.trim();
        const mismatch = emailConfirm !== '' && email !== emailConfirm;
        setFieldError('emailConfirm', mismatch);
        return !mismatch;
      }

      form.elements.email.addEventListener('input', checkEmailMatch);
      form.elements.emailConfirm.addEventListener('input', checkEmailMatch);

      CommonUtils.attachEmailTypoCheck(form.elements.email, document.getElementById('emailTypoWarning'));

      function validate() {
        let isValid = true;

        requiredFields.forEach(function (name) {
          const isEmpty = form.elements[name].value.trim() === '';
          setFieldError(name, isEmpty);
          if (isEmpty) isValid = false;
        });

        const email = form.elements.email.value.trim();
        if (email !== '' && !CommonUtils.isValidEmail(email)) {
          setFieldError('email', true);
          isValid = false;
        }

        if (!checkEmailMatch()) {
          isValid = false;
        }

        return isValid;
      }

      form.addEventListener('submit', async function (event) {
        event.preventDefault();
        CommonUtils.clearMessage(messageBox);

        if (!validate()) {
          CommonUtils.showMessage(messageBox, 'error', '入力内容をご確認のうえ、赤字の項目を修正してください。');
          return;
        }

        const payload = {
          companyName: form.elements.companyName.value.trim(),
          contactName: form.elements.contactName.value.trim(),
          email: form.elements.email.value.trim(),
          phone: form.elements.phone.value.trim(),
          category: form.elements.category.value,
          description: form.elements.description.value.trim(),
          powerNeeded: form.elements.powerNeeded.value,
          loadingTime: form.elements.loadingTime.value.trim(),
          notes: form.elements.notes.value.trim()
        };

        CommonUtils.setLoading(submitBtn, true, '送信中...', '申し込む');

        try {
          const result = await callGasApi('registerExhibitor', payload);
          if (result && result.success) {
            CommonUtils.showMessage(
              messageBox,
              'success',
              'お申し込みを受け付けました。ご登録のメールアドレス宛に確認のご連絡をいたします。'
            );
            form.reset();
          } else {
            CommonUtils.showMessage(
              messageBox,
              'error',
              (result && result.message) || '送信に失敗しました。時間をおいて再度お試しください。'
            );
          }
        } catch (err) {
          CommonUtils.showMessage(
            messageBox,
            'error',
            '通信エラーが発生しました。ネットワーク環境をご確認のうえ、再度お試しください。'
          );
        } finally {
          CommonUtils.setLoading(submitBtn, false, '送信中...', '申し込む');
        }
      });
    })();
  </script>
</body>
</html>
